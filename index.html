<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Homies!</title>
    <style>
        :root {
            --message-top: 50px;
            --message-left: 1px;
            --message-right: 5px;
            --message-bottom: 78px;
            --form-bottom: 2px;
            --form-left: 4px;
            --form-right: 2px;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, rgb(67, 20, 128), rgb(240, 65, 129));
            color: rgb(240, 250, 200);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #usernameContainer {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
        }

        #chatContainer {
            display: flex;
            flex-direction: column;
            height: 80vh;
            width: 600px;
            max-width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
            box-sizing: border-box;
            border: none;
            position: relative;
            padding-bottom: 70px;
        }

        .call-status {
            padding: 5px 10px;
            text-align: center;
            font-weight: bold;
            z-index: 2; 
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            margin-top: 50px; 
            color: white;
            display: none; /* Hide by default */
        }

        .call-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            margin-bottom: 10px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1;
        }

        .active-users {
            padding: 5px 10px;
            margin-bottom: 5px;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            display: none;
        }

        #messages {
            list-style-type: none;
            padding: 10px;
            margin: 0;
            flex: 1;
            overflow-y: scroll !important; 
            overflow-x: hidden;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            min-height: 460px; 
            border: none;
            max-height: none; /* Remove max height to allow full expansion */
            margin-bottom: 0px; 
            position: absolute; 
            top: var(--message-top); /* Using CSS variable */
            left: var(--message-left); /* Using CSS variable */
            right: var(--message-right); /* Using CSS variable */
            bottom: var(--message-bottom); /* Using CSS variable */
        }

        /* Force scrollbar for all browsers */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgb(67, 20, 128) rgba(0, 0, 0, 0.1);
        }

        /* WebKit browsers (Chrome, Safari, etc.) */
        ::-webkit-scrollbar {
            width: 12px !important;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2) !important;
            border-radius: 5px !important;
        }

        ::-webkit-scrollbar-thumb {
            background: rgb(67, 20, 128) !important;
            border-radius: 5px !important;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgb(240, 65, 129) !important;
        }

        /* Firefox - using variables for hover effect simulation */
        * {
            --scrollbar-color: rgb(67, 20, 128);
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-color) rgba(0, 0, 0, 0.2);
        }

        /* Add a hover effect via JavaScript since Firefox doesn't support hover on scrollbars directly */
        
        /* Make sure the messages container has specific styling */
        #messages::-webkit-scrollbar-thumb {
            background: rgb(67, 20, 128) !important;
            border-radius: 5px !important;
        }

        #messages::-webkit-scrollbar-thumb:hover {
            background: rgb(240, 65, 129) !important;
        }

        #messageForm {
            padding: 14px;
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            position: absolute;
            bottom: var(--form-bottom); /* Using CSS variable */
            left: var(--form-left); /* Using CSS variable */
            right: var(--form-right); /* Using CSS variable */
            border: none;
            box-sizing: border-box;
            margin: 0;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            box-sizing: border-box;
        }

        #messageInput::placeholder {
            color: rgba(67, 20, 128, 0.7);
        }

        /* Add common button styles near the top */
        button, .call-button, .send-button {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover, .call-button:hover, .send-button:hover {
            background-color: rgb(240, 65, 129);
        }

        .secondary-button {
            background-color: rgba(67, 20, 128, 0.8);
            color: rgb(240, 250, 200);
            border: 1px solid rgb(240, 65, 129);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .secondary-button:hover {
            background-color: rgb(240, 65, 129);
        }

        button[type="submit"] {
            padding: 0 15px;
        }

        .send-button {
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .send-button:hover {
            background-color: rgb(240, 65, 129);
        }

        .call-button {
            padding: 10px 20px;
        }

        .call-button:hover {
            background-color: rgb(240, 65, 129);
        }

        .accept-call {
            background-color: rgb(67, 20, 128);
        }

        .accept-call:hover {
            background-color: rgb(240, 65, 129);
        }

        .decline-call {
            background-color: rgb(67, 20, 128);
        }

        .decline-call:hover {
            background-color: rgb(240, 65, 129);
        }

        .start-call, .test-audio {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
        }

        .start-call:hover, .test-audio:hover {
            background-color: rgb(240, 65, 129);
        }

        .end-call {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
        }

        .end-call:hover {
            background-color: rgb(240, 65, 129);
        }

        .accept-call {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
        }

        .accept-call:hover {
            background-color: rgb(240, 65, 129);
        }

        .decline-call {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
        }

        .decline-call:hover {
            background-color: rgb(240, 65, 129);
        }

        #callTarget {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid rgb(67, 20, 128);
            margin-right: 10px;
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            transition: background-color 0.3s;
        }

        #callTarget:hover {
            background-color: rgb(26, 179, 59);
            border-color: rgb(26, 179, 59);
        }

        #callTarget option {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
        }

        #callTarget option:hover {
            background-color: rgb(26, 179, 59);
        }

        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            width: 100%;
        }

        .message-content {
            max-width: 70%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            padding: 10px;
            border-radius: 10px;
            white-space: pre-wrap;
            box-sizing: border-box;
            overflow: hidden;
            border: none;
        }

        .username {
            font-size: 0.8em;
            margin-bottom: 2px;
            opacity: 0.8;
        }

        .user {
            flex-direction: column;
            align-items: flex-end;
        }

        .other {
            flex-direction: column;
            align-items: flex-start;
        }

        .user .message-content {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            text-align: right;
            border: 3px solid rgb(240, 65, 129);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            border-radius: 18px 18px 0 18px;
            position: relative;
        }

        .user .message-content::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 15px;
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-top-color: rgb(240, 65, 129);
            border-bottom: 0;
            border-right: 0;
            margin-left: -5px;
            margin-bottom: -10px;
        }

        .other .message-content {
            background-color: rgb(240, 65, 129);
            color: rgb(240, 250, 200);
            text-align: left;
            border: 3px solid rgb(67, 20, 128);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 18px 18px 18px 0;
        }

        input[type="text"] {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: rgb(240, 250, 200);
            color: #000000;
            margin-left: -3px; /* Added negative margin to extend left */
        }

        .call-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            justify-content: center;
            align-items: center;
        }

        .call-button {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .settings-button {
            background: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .settings-button:hover {
            background: rgb(240, 65, 129);
        }

        .settings-button.testing {
            background-color: #ff3b3b;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .debug-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            display: none;
        }

        .debug-toggle {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            z-index: 1001;
        }

        .debug-toggle:hover {
            background-color: rgb(240, 65, 129);
        }

        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgb(255, 255, 255);
            z-index: 1000;
            display: none;
            color: black;
            width: 350px;
        }

        .settings-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: black;
        }
        
        .settings-panel label {
            color: black;
            display: block;
            margin-bottom: 5px;
        }
        
        .settings-panel input, 
        .settings-panel select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .settings-panel button {
            margin-top: 5px;
        }

        /* Remove the round call button styles - we'll use the standard button styles instead */
        .round-call-button {
            display: none; /* Hide this class */
        }
        
        .round-end-button {
            display: none; /* Hide this class */
        }

        /* Make sure the start-call and end-call classes are properly defined */
        .start-call {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            padding: 10px 20px;
            border-radius: 5px;
        }
        
        .end-call {
            background-color: rgb(67, 20, 128);
            color: rgb(240, 250, 200);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
        }
        
        /* Warning message when no users are available */
        .no-users-message {
            display: none;
            margin-top: 5px;
            color: #f02849;
            font-size: 0.85em;
        }
        
        .video-call-controls.no-users .no-users-message {
            display: block;
        }
        
        /* Incoming call dialog */
        #incomingCallDialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(67, 20, 128, 0.9);
            color: rgb(240, 250, 200);
            padding: 20px;
            border-radius: 10px;
            z-index: 1001;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        #incomingCallDialog h3 {
            margin-top: 0;
        }
        
        #incomingCallDialog button {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="usernameContainer" style="display: none;">
        <h2>Enter your details</h2>
        <form id="usernameForm">
            <input type="text" id="usernameInput" placeholder="Enter username..." required />
            <input type="password" id="passwordInput" placeholder="Enter password..." required />
            <button type="submit">Join Chat</button>
        </form>
        <div style="margin-top: 15px; display: flex; justify-content: center;">
            <button id="createNewAccountBtn" class="secondary-button">Create New Account</button>
        </div>
    </div>
    
    <div id="chatContainer" class="chat-container">
        <div class="call-status" id="callStatus"></div>
        <div class="call-controls" id="video-call-controls">
            <select id="callTarget">
                <option value="">Select user to call...</option>
            </select>
            <div class="no-users-message">No other users are currently online</div>
            <button class="call-button start-call" id="startCall">Start Call</button>
            <button class="call-button end-call" id="endCall">End Call</button>
            <button class="call-button accept-call" id="acceptCall" style="display: none;">Accept</button>
            <button class="call-button decline-call" id="declineCall" style="display: none;">Decline</button>
            <button class="settings-button" id="showSettings">⚙️</button>
            <button class="settings-button" id="signOutBtn" style="background-color: #d9534f;">Sign Out</button>
        </div>
        <div id="activeUsers" class="active-users" style="display: none;"></div>
        <ul id="messages"></ul>
        <form id="messageForm">
            <input type="text" id="messageInput" placeholder="Type a message..." />
            <button type="submit" class="send-button">Send</button>
        </form>
    </div>

    <div class="modal-backdrop" id="settingsBackdrop"></div>
    <div class="settings-panel" id="settingsPanel">
        <h3>Audio Settings</h3>
        <div>
            <label for="audioInput">Microphone:</label>
            <select id="audioInput"></select>
        </div>
        <div>
            <label for="audioOutput">Speaker:</label>
            <select id="audioOutput"></select>
        </div>
        <div style="margin-top: 20px;">
            <button class="settings-button" id="testMicrophone">Test Microphone</button>
            <button class="settings-button" id="testSpeaker">Test Speaker</button>
            <button class="settings-button" id="saveSettings">Save</button>
        </div>
        
        <h3>Account Settings</h3>
        <form id="changePasswordForm">
            <div>
                <label for="newPassword">New Password:</label>
                <input type="password" id="newPassword" required />
            </div>
            <div>
                <label for="confirmPassword">Confirm New Password:</label>
                <input type="password" id="confirmPassword" required />
            </div>
            <div style="margin-top: 10px;">
                <button type="submit" class="settings-button">Change Password</button>
            </div>
        </form>
    </div>

    <!-- Add incoming call dialog -->
    <div id="incomingCallDialog" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(67, 20, 128, 0.9); color: rgb(240, 250, 200); padding: 20px; border-radius: 10px; z-index: 1001; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
        <h3>Incoming Call</h3>
        <p id="incomingCallText">Incoming call from...</p>
        <div style="display: flex; justify-content: center; gap: 10px; margin-top: 15px;">
            <button id="incomingAcceptBtn" style="background-color: green; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Accept</button>
            <button id="incomingDeclineBtn" style="background-color: #d9534f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Decline</button>
        </div>
    </div>

    <div id="debugInfo" class="debug-info"></div>
    <button id="debugToggle" class="debug-toggle">Debug</button>
    <audio id="remoteAudio" autoplay controls></audio>
    <audio id="testAudioOut" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>
    <div id="audioFeedback" style="display: none; position: fixed; bottom: 50px; right: 10px; background-color: rgba(0,0,128,0.7); color: white; padding: 10px; border-radius: 5px; z-index: 1000;"></div>
    <audio id="incomingCallSound" src="https://assets.mixkit.co/active_storage/sfx/2355/2355-preview.mp3" preload="auto" loop></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Variables to be initialized after page is ready
        let socket;
        let username = localStorage.getItem('username');
        let localStream = null;
        let peerConnection = null;
        let activeCall = false;
        let callToUsername = null;
        let incomingCaller = null;
        let socketInitialized = false;
        // Store audio monitoring intervals for cleanup
        let audioMonitoringIntervals = [];
        let connectionMonitorInterval = null;
        
        // DOM elements
        const messagesContainer = document.getElementById('messages');
        const messageForm = document.getElementById('messageForm');
        const messageInput = document.getElementById('messageInput');
        const usernameContainer = document.getElementById('usernameContainer');
        const chatContainer = document.getElementById('chatContainer');
        const activeUsersList = document.getElementById('activeUsers');
        const callTarget = document.getElementById('callTarget');
        const startCallBtn = document.getElementById('startCall');
        const endCallBtn = document.getElementById('endCall');
        const acceptCallBtn = document.getElementById('acceptCall');
        const declineCallBtn = document.getElementById('declineCall');
        const callStatus = document.getElementById('callStatus');
        const videoCallControls = document.getElementById('video-call-controls');
        const showSettingsBtn = document.getElementById('showSettings');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsBackdrop = document.getElementById('settingsBackdrop');
        const usernameForm = document.getElementById('usernameForm');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        
        // Prevent accidental form submissions on page load
        let pageFullyLoaded = false;
        window.addEventListener('load', function() {
            setTimeout(() => {
                // Initialize socket only after page is fully loaded
                if (!socketInitialized) {
                    socket = io({
                        reconnectionAttempts: 5,
                        timeout: 10000,
                        autoConnect: true
                    });
                    
                    // Set up all the socket event handlers
                    setupSocketEvents();
                    
                    socketInitialized = true;
                    console.log("Socket initialized");
                }
                
                pageFullyLoaded = true;
                console.log("Page fully loaded");
            }, 1500); // Increased to 1500ms for better reliability
        });
        
        // Debug information
        const debugInfoElement = document.createElement('pre');
        debugInfoElement.style.position = 'fixed';
        debugInfoElement.style.bottom = '10px';
        debugInfoElement.style.right = '10px';
        debugInfoElement.style.background = 'rgba(0, 0, 0, 0.7)';
        debugInfoElement.style.color = 'lime';
        debugInfoElement.style.padding = '10px';
        debugInfoElement.style.fontSize = '12px';
        debugInfoElement.style.maxHeight = '300px';
        debugInfoElement.style.overflow = 'auto';
        debugInfoElement.style.zIndex = '9999';
        document.body.appendChild(debugInfoElement);
        
        function updateDebugInfo(info) {
            try {
                const currentInfo = JSON.parse(debugInfoElement.textContent || '{}');
                const updatedInfo = { ...currentInfo, ...info, timestamp: new Date().toISOString() };
                debugInfoElement.textContent = JSON.stringify(updatedInfo, null, 2);
            } catch (e) {
                console.error("Error updating debug info:", e);
            }
        }
        
        // Scroll position handling
        let userIsScrolling = false;
        let lastScrollTop = 0;
        
        function forceScrollToBottom() {
            try {
                // Only scroll if user is not manually viewing history
                if (!userIsScrolling) {
                    // Set scrollTop directly to force scroll to bottom
                    const messagesDiv = document.getElementById('messages');
                    if (messagesDiv) {
                        messagesDiv.scrollTop = messagesDiv.scrollHeight + 10000;
                        console.log('Forced scroll to bottom:', messagesDiv.scrollHeight);
                    }
                }
            } catch (e) {
                console.error('Scroll error:', e);
            }
        }
        
        function scrollToBottom() {
            // Only auto-scroll if user isn't manually scrolling up
            if (!userIsScrolling) {
                forceScrollToBottom();
                // Set multiple timeouts to ensure scrolling happens
                setTimeout(forceScrollToBottom, 100);
                setTimeout(forceScrollToBottom, 500);
                setTimeout(forceScrollToBottom, 1000);
            }
        }
        
        function isUserAtBottom() {
            const scrollPosition = messagesContainer.scrollTop + messagesContainer.clientHeight;
            const scrollThreshold = messagesContainer.scrollHeight - 50; // 50px threshold
            return scrollPosition >= scrollThreshold;
        }
        
        // Detect when user manually scrolls
        messagesContainer.addEventListener('scroll', function() {
            // Get current scroll position
            const currentScrollTop = messagesContainer.scrollTop;
            
            // If scrolling up, user is manually viewing history
            if (currentScrollTop < lastScrollTop) {
                userIsScrolling = true;
                console.log('User is scrolling up, pausing auto-scroll');
            }
            
            // If scrolled to bottom, resume auto-scroll
            if (isUserAtBottom()) {
                userIsScrolling = false;
                console.log('User scrolled to bottom, resuming auto-scroll');
            }
            
            // Update last position
            lastScrollTop = currentScrollTop;
        });
        
        // Manual control to let user view history
        messagesContainer.addEventListener('mousewheel', function() {
            // Temporarily disable auto-scroll during active scrolling
            userIsScrolling = true;
            
            // Re-enable if user scrolls to bottom
            if (isUserAtBottom()) {
                userIsScrolling = false;
            }
            
            // Set a timeout to check if user is at bottom after scrolling stops
            clearTimeout(messagesContainer.scrollTimeout);
            messagesContainer.scrollTimeout = setTimeout(function() {
                if (isUserAtBottom()) {
                    userIsScrolling = false;
                }
            }, 1000);
        });
        
        // Always scroll to bottom on page load and on document ready
        window.addEventListener('load', scrollToBottom);
        document.addEventListener('DOMContentLoaded', scrollToBottom);
        
        // Initialize UI state based on username availability
        if (!username || localStorage.getItem('isLoggedOut') === 'true') {
            // Pre-fill the username field if it exists in localStorage
            if (username) {
                usernameInput.value = username;
            }
            
            usernameContainer.style.display = 'block';
            chatContainer.style.display = 'none';
        } else {
            // Try to use stored credentials
            const storedPassword = localStorage.getItem('chatPassword');
            if (storedPassword) {

        function joinChat(username) {
            usernameContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            // Make sure socket is connected
            if (!socket || !socket.connected) {
                if (!socket) {
                    socket = io({
                        reconnectionAttempts: 5,
                        timeout: 10000,
                        autoConnect: true
                    });
                    setupSocketEvents();
                } else {
                    socket.connect();
                }
            }
            
            // Join the chat
            socket.emit('join', username);
            
            // Update active user list
            updateDebugInfo({
                username: username,
                action: 'joined-chat'

            // Clear the logged out flag

            if (!message) {
                console.log("Empty message prevented");
                return; // Prevent sending empty messages
            }
            
            // Emit message to server with the correct event name
            socket.emit('message', {
                username: username,
                message: message
            });

        // Call functions
        async function startCall() {
            if (!callTarget.value || callTarget.value === username) {
                alert('Please select a valid user to call');
                return;
            }
            
            try {
                callToUsername = callTarget.value;
                callStatus.textContent = `Calling ${callToUsername}...`;
                callStatus.style.display = 'block';
                
                // Use same constraints as the caller for consistency
                const constraints = {
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: false
                };
                
                // Get the media stream with simplified constraints
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                console.log("Local stream tracks:", 
                    localStream.getTracks().map(t => 
                        `${t.kind}: enabled=${t.enabled}, muted=${t.muted}, label=${t.label}`
                    ).join('\n')
                );
                
                // Create peer connection
                peerConnection = new RTCPeerConnection(rtcConfig);
                
                // Add local tracks to peer connection
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                    console.log(`Added local track to peer connection: ${track.kind}`);
                });
                
                // Set up event handlers
                setupPeerConnectionHandlers();
                
                // Create offer with explicit audio options
                const offerOptions = {
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: false,
                    iceRestart: true, // Add explicit ice restart to force new ICE candidates
                    voiceActivityDetection: true
                };
                
                console.log("Creating offer with options:", JSON.stringify(offerOptions));
                const offer = await peerConnection.createOffer(offerOptions);
                
                console.log("SDP offer created:", offer.sdp.substring(0, 100) + "...");
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('call-offer', {
                    offer: peerConnection.localDescription,
                    caller: username,
                    target: callToUsername,
                    sender: username  // Add sender information 
                });
                
                // Update UI
                startCallBtn.style.display = 'none';
                endCallBtn.style.display = 'inline-block';
                activeCall = true;
                
                updateDebugInfo({
                    action: 'call-started',
                    target: callToUsername
                });
                
            } catch (error) {
                console.error('Error starting call:', error);
                callStatus.textContent = `Call failed: ${error.message}`;
                updateDebugInfo({
                    error: error.message
                });
            }
        }
        
        function setupPeerConnectionHandlers() {
            // Handle ICE connection state changes
            peerConnection.oniceconnectionstatechange = (event) => {
                console.log(`ICE connection state changed to: ${peerConnection.iceConnectionState}`);
                updateDebugInfo({
                    iceStateChange: peerConnection.iceConnectionState,
                    timestamp: new Date().toISOString()
                });
                
                // If connected, ensure audio is playing
                if (peerConnection.iceConnectionState === 'connected' || 
                    peerConnection.iceConnectionState === 'completed') {
                    
                    // Ensure remote audio is unmuted and playing
                    const remoteAudio = document.getElementById('remoteAudio');
                    remoteAudio.muted = false;
                    
                    // Try to ensure audio is played after connection
                    remoteAudio.play().catch(e => console.log("Error playing remote audio:", e));
                    
                }
            };
            
            // Handle connection state changes
            peerConnection.onconnectionstatechange = (event) => {
                console.log(`Connection state changed to: ${peerConnection.connectionState}`);
                updateDebugInfo({
                    connStateChange: peerConnection.connectionState,
                    timestamp: new Date().toISOString()
                });
                
                // If disconnected or failed, reset call
                if (peerConnection.connectionState === 'disconnected' || 
                    peerConnection.connectionState === 'failed') {
                    console.log("Connection disconnected or failed");
                    resetCallState();
                    callStatus.textContent = 'Call ended due to connection issues';
                }
                
                // If connected, ensure audio is playing
                if (peerConnection.connectionState === 'connected') {
                    const remoteAudio = document.getElementById('remoteAudio');
                    // Force audio to play if it's paused
                    if (remoteAudio.paused) {
                        remoteAudio.play().catch(e => console.error("Failed to play on activity:", e));
                    }
                }
            };
            
            // Handle ICE candidate events
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log("Generated ICE candidate for:", callToUsername || incomingCaller);
                    
                    // Send the ICE candidate to the other peer
                    socket.emit('ice-candidate', {
                        candidate: event.candidate,
                        target: callToUsername || incomingCaller,
                        sender: username
                    });
                } else {
                    console.log("All ICE candidates have been generated");
                }
            };
            
            // Handle incoming audio track
            peerConnection.ontrack = (event) => {
                console.log(`Received track: ${event.track.kind}`);
                
                const remoteAudio = document.getElementById('remoteAudio');
                
                // Create a new MediaStream if one doesn't exist
                if (!remoteAudio.srcObject) {
                    remoteAudio.srcObject = new MediaStream();
                }
                
                // Add the track to the MediaStream
                remoteAudio.srcObject.addTrack(event.track);
                
                // Force audio to play
                remoteAudio.play()
                .then(() => {
                    console.log("Remote audio playing successfully");
                    // Unmute explicitly
                    remoteAudio.muted = false;
                    // Monitor audio levels
                    monitorAudioLevels(remoteAudio, event.track);
                })
                .catch(error => {
                    console.error("Failed to play remote audio:", error);
                    updateDebugInfo({
                        remoteAudioError: error.message
                    });
                    
                    // Try again after a moment
                    setTimeout(() => {
                        remoteAudio.play().catch(e => console.log("Retry play failed:", e));
                    }, 1000);
                });
                
                updateDebugInfo({
                    action: 'track-received',
                    kind: event.track.kind,
                    trackId: event.track.id,
                    timestamp: new Date().toISOString()
                });
            };
        }
        
        // Socket event handlers
        function setupSocketEvents() {
            // Socket event handlers
            socket.on('connect', () => {
                console.log('Connected to server');
                updateDebugInfo({socketConnected: true, socketId: socket.id});
                
                if (username) {
                    // Use verify-user instead of join to match server expectations
                    const storedPassword = localStorage.getItem('chatPassword');
                    if (storedPassword) {
                        socket.emit('verify-user', { username, password: storedPassword }, (response) => {
                            if (response.success) {
                                updateDebugInfo({verifiedUser: true, username: username});
                                console.log('Successfully verified user on socket connect');
                                
                                // Join chat after verification
                                joinChat(username);
                            } else {
                                console.log('Failed to verify user on socket connect');
                                updateDebugInfo({verifiedUser: false, error: 'Failed to verify on socket connect'});
                            }
                        });
                    } else {
                        // For backward compatibility
                        socket.emit('set-username', username);
                        updateDebugInfo({setUsername: true, username: username});
                        console.log('Using set-username as fallback');
                        
                        // Join chat after setting username
                        joinChat(username);
                    }
                }
            });
            
            socket.on('user-joined', (user) => {
                appendMessage(`${user} joined the chat`);
                addActiveUser(user);
            });
            
            socket.on('user-left', (user) => {
                appendMessage(`${user} left the chat`);
                removeActiveUser(user);
            });
            
            socket.on('chat-message', (data) => {
                // Extra validation to prevent blank messages
                if (data && (data.text || data.message)) {
                    appendMessage(data);
                    scrollToBottom();
                } else {
                    console.log("Received invalid message data:", data);
                }
            });
            
            socket.on('chat history', (history) => {
                // Clear existing messages first
                messagesContainer.innerHTML = '';
                
                // Add each message from history
                history.forEach(msg => {
                    // Skip any messages that don't have text content
                    if (!msg.text && !msg.message) {
                        console.log("Skipped empty message in history", msg);
                        return;
                    }
                    appendMessage(msg);
                });
                
                // Always scroll to the bottom after history is loaded
                setTimeout(scrollToBottom, 100);
                setTimeout(scrollToBottom, 500);
                setTimeout(scrollToBottom, 1000);
                
                // Mark that history has been loaded
                updateDebugInfo({historyLoaded: true, messageCount: history.length});
            });
            
            socket.on('active-users', (users) => {
                console.log('Received active users:', users);
                updateActiveUsers(users);
                updateDebugInfo({activeUsers: users});
            });
            
            socket.on('call-offer', (data) => {
                console.log("Received call offer from:", data.caller);
                
                // Store the caller and offer
                incomingCaller = data.caller;
                incomingOffer = data.offer;
                
                // Stop any existing call sound that might be playing
                const callSound = document.getElementById('incomingCallSound');
                callSound.pause();
                callSound.currentTime = 0;
                
                // Play the incoming call sound
                callSound.play().catch(e => console.error("Error playing call sound:", e));
                
                // Update the incoming call dialog with caller information
                const incomingCallText = document.getElementById('incomingCallText');
                incomingCallText.textContent = `Incoming call from ${incomingCaller}`;
                
                // Show the incoming call dialog
                const incomingCallDialog = document.getElementById('incomingCallDialog');
                incomingCallDialog.style.display = 'block';
                
                // Update the call status UI
                callStatus.textContent = `Incoming call from ${incomingCaller}...`;
                callStatus.style.display = 'block';
                acceptCallBtn.style.display = 'inline-block';
                declineCallBtn.style.display = 'inline-block';
                
                updateDebugInfo({
                    action: 'call-offer-received',
                    caller: data.caller
                });
            });

            socket.on('call-answer', (data) => {
                const { answer, callee, sender } = data;
                console.log(`Received call answer from ${callee || sender}`);
                
                try {
                    // Set remote description from answer
                    peerConnection.setRemoteDescription(new RTCSessionDescription(answer))
                    .then(() => {
                        console.log("Remote description set successfully from answer");
                        
                        // Update UI
                        callStatus.textContent = `Connected to ${callee || sender}`;
                        
                        updateDebugInfo({
                            action: 'call-answered',
                            remoteDescription: true,
                            from: callee || sender
                        });
                    })
                    .catch(error => {
                        console.error("Error setting remote description from answer:", error);
                        updateDebugInfo({
                            action: 'call-answer-error',
                            error: error.message
                        });
                    });
                } catch (error) {
                    console.error("Exception in call-answer handler:", error);
                    updateDebugInfo({
                        action: 'call-answer-exception',
                        error: error.message
                    });
                }
            });

            socket.on('ice-candidate', (data) => {
                const { candidate, sender } = data;
                console.log(`Received ICE candidate from ${sender}`);
                
                if (peerConnection) {
                    try {
                        peerConnection.addIceCandidate(new RTCIceCandidate(candidate))
                        .then(() => {
                            console.log(`Added ICE candidate from ${sender}`);
                            updateDebugInfo({
                                action: 'ice-candidate-added',
                                from: sender,
                                iceState: peerConnection.iceConnectionState,
                                connState: peerConnection.connectionState
                            });
                        })
                        .catch(error => {
                            console.error(`Error adding ICE candidate from ${sender}:`, error);
                            updateDebugInfo({
                                action: 'ice-candidate-error',
                                error: error.message,
                                from: sender
                            });
                        });
                    } catch (error) {
                        console.error("Exception in ice-candidate handler:", error);
                        updateDebugInfo({
                            action: 'ice-candidate-exception',
                            error: error.message
                        });
                    }
                } else {
                    console.warn("Received ICE candidate but no peer connection exists");
                    updateDebugInfo({
                        action: 'ice-candidate-no-peer',
                        from: sender
                    });
                }
            });
        }

            userElement.classList.add('active-user');
            userElement.dataset.username = user;

            if (userElement) userElement.remove();
            
            // Remove from call target dropdown
            const option = Array.from(callTarget.options).find(opt => opt.value === user);
            if (option) callTarget.removeChild(option);

            while (callTarget.options.length > 1) {
                callTarget.removeChild(callTarget.options[1]);

                if (user !== username) {
                    addActiveUser(user);

        document.getElementById('testMicrophone').addEventListener('click', async function() {
            try {

                const analyser = audioContext.createAnalyser();

                feedbackDiv.textContent = 'Listening to microphone...';
                feedbackDiv.style.display = 'block';
                
                // Get user media with selected device

                    audio: selectedMicrophoneId ? {
                        deviceId: {exact: selectedMicrophoneId},
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } : true
                });
                
                console.log("Microphone test stream obtained with tracks:", 
                    testStream.getTracks().map(t => 
                        `${t.kind}: enabled=${t.enabled}, muted=${t.muted}, label=${t.label}`
                    ).join('\n')
                );
                
                // Connect to audio analyser
                const source = audioContext.createMediaStreamSource(testStream);
                source.connect(analyser); // Critical line - connect source to analyzer
                
                // Create data array for analysis
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                // Test for 5 seconds
                let testDuration = 5; // seconds
                feedbackDiv.textContent = `Testing microphone: ${testDuration}s remaining`;
                
                // Update every 500ms
                const testInterval = setInterval(() => {
                    analyser.getByteFrequencyData(dataArray);
                    
                    // Calculate average volume
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i];
                    }
                    const average = sum / dataArray.length;
                    
                    console.log(`Microphone level: ${average.toFixed(2)}`);
                    
                    // Update feedback based on volume
                    if (average > 10) {
                        feedbackDiv.textContent = `Microphone working! Sound detected (${testDuration}s remaining)`;
                        feedbackDiv.style.backgroundColor = 'rgba(0,128,0,0.7)';
                    } else {
                        feedbackDiv.textContent = `No sound detected (${testDuration}s remaining)`;
                        feedbackDiv.style.backgroundColor = 'rgba(128,0,0,0.7)';
                    }
                    
                    testDuration--;
                    
                    if (testDuration < 0) {
                        clearInterval(testInterval);
                        // Stop all tracks
                        testStream.getTracks().forEach(track => track.stop());
                        // Hide feedback after a delay
                        setTimeout(() => {
                            feedbackDiv.style.display = 'none';
                        }, 1000);
                    }
                }, 1000);

        // Function to populate audio device lists
        async function populateAudioDevices() {
            try {
                // Get microphone and speaker selectors
                const audioInputSelect = document.getElementById('audioInput');
                const audioOutputSelect = document.getElementById('audioOutput');
                
                // Clear existing options
                audioInputSelect.innerHTML = '';
                audioOutputSelect.innerHTML = '';
                
                // Get a list of all media devices
                const devices = await navigator.mediaDevices.enumerateDevices();
                
                // Filter audio input devices (microphones)
                const audioInputDevices = devices.filter(device => device.kind === 'audioinput');
                audioInputDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Microphone ${audioInputSelect.length + 1}`;
                    audioInputSelect.appendChild(option);
                });
                
                // Filter audio output devices (speakers)
                const audioOutputDevices = devices.filter(device => device.kind === 'audiooutput');
                audioOutputDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Speaker ${audioOutputSelect.length + 1}`;
                    audioOutputSelect.appendChild(option);
                });
                
                // If no devices were found with labels, we need to request permission
                if (!audioInputDevices.some(device => device.label) || !audioOutputDevices.some(device => device.label)) {
                    console.log("No labeled devices found, requesting permission...");
                    // Request microphone permission to get device labels
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    // After getting permission, re-enumerate devices to get labels
                    stream.getTracks().forEach(track => track.stop());
                    populateAudioDevices(); // Recursively call to populate with labels
                }
            } catch (error) {
                console.error("Error populating audio devices:", error);
                alert("Could not access audio devices. Please ensure you've granted microphone permissions.");
            }
        }
        
        // Save audio settings
        document.getElementById('saveSettings').addEventListener('click', () => {
            const audioInputSelect = document.getElementById('audioInput');
            const audioOutputSelect = document.getElementById('audioOutput');
            
            // Save selected devices to localStorage
            if (audioInputSelect.value) {
                localStorage.setItem('preferredMicrophone', audioInputSelect.value);
            }
            
            if (audioOutputSelect.value) {
                localStorage.setItem('preferredSpeaker', audioOutputSelect.value);
            }
            
            alert("Audio settings saved!");
            
            // Close settings panel
            settingsPanel.style.display = 'none';
            settingsBackdrop.style.display = 'none';
        });
        
        // Close settings when clicking backdrop
        settingsBackdrop.addEventListener('click', () => {
            settingsPanel.style.display = 'none';
            settingsBackdrop.style.display = 'none';
        });
        
        // Debug toggle functionality
        const debugInfo = document.getElementById('debugInfo');
        const debugToggle = document.getElementById('debugToggle');
        
        // Initialize debug display based on saved preference
        if (localStorage.getItem('debugEnabled') === 'true') {
            debugInfo.style.display = 'block';
            debugToggle.textContent = 'Hide Debug';
        }
        
        debugToggle.addEventListener('click', () => {
            const debugEnabled = localStorage.getItem('debugEnabled') === 'true';
            localStorage.setItem('debugEnabled', !debugEnabled);
            
            if (!debugEnabled) {
                debugInfo.style.display = 'block';
                debugToggle.textContent = 'Hide Debug';
            } else {
                debugInfo.style.display = 'none';
                debugToggle.textContent = 'Show Debug';
            }
        });
        
        // Add sign out functionality
        const signOutBtn = document.getElementById('signOutBtn');
        const createNewAccountBtn = document.getElementById('createNewAccountBtn');
        
        signOutBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to sign out?')) {
                // Set a flag in localStorage to indicate logged out state
                localStorage.setItem('isLoggedOut', 'true');
                
                // Notify server about leaving (use disconnection flow)
                socket.disconnect();
                
                // Show login screen
                usernameContainer.style.display = 'block';
                chatContainer.style.display = 'none';
                
                // Pre-fill the username field if available
                if (username) {
                    usernameInput.value = username;
                    // Clear password field for security
                    passwordInput.value = '';
                }
                
                // Reset any active call state
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                
                console.log('User signed out but credentials saved');
            }
        });
        
        // Add create new account functionality
        createNewAccountBtn.addEventListener('click', function() {
            // Clear existing form fields to start fresh
            usernameInput.value = '';
            passwordInput.value = '';
            
            // Focus on username input
            usernameInput.focus();
            
            // Optional: Add visual indication that we're in "create account" mode
            document.querySelector('#usernameContainer h2').textContent = 'Create a New Account';
            
            // Change the submit button text temporarily
            const submitBtn = usernameForm.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Create & Join';
            
            // Add a flag to indicate we're creating a new account
            usernameForm.dataset.mode = 'create';
            
            // Add a back button option if they want to go back to login
            if (!document.getElementById('backToLoginBtn')) {
                const backBtn = document.createElement('button');
                backBtn.id = 'backToLoginBtn';
                backBtn.className = 'secondary-button';
                backBtn.textContent = 'Back to Login';
                backBtn.style.marginLeft = '10px';
                createNewAccountBtn.parentNode.appendChild(backBtn);
                
                backBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelector('#usernameContainer h2').textContent = 'Enter your details';
                    submitBtn.textContent = 'Join Chat';
                    usernameForm.dataset.mode = 'login';
                    this.remove();
                });
            }
        });
        
        // Function to update debug info
        function updateDebugInfo(info) {
            const debugInfo = document.getElementById('debugInfo');
            // Add timestamp to debug info
            info.timestamp = new Date().toISOString();
            
            if (localStorage.getItem('debugEnabled') === 'true') {
                debugInfo.innerHTML = JSON.stringify(info, null, 2);
            }
            
            // Also log to console for easier debugging
            console.log("Debug Info:", info);
        }
        
        // Accept call functionality
        async function acceptCall() {
            try {
                // Get reference to the dialog element
                const incomingCallDialog = document.getElementById('incomingCallDialog');
                const incomingCallSound = document.getElementById('incomingCallSound');
                
                // Hide dialog and stop sound
                incomingCallDialog.style.display = 'none';
                incomingCallSound.pause();
                incomingCallSound.currentTime = 0;
                
                callStatus.textContent = `In call with ${incomingCaller}`;
                callStatus.style.display = 'block';
                
                // Use same constraints as the caller for consistency
                const constraints = {
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: false
                };
                
                // Get media stream
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                console.log("Local stream obtained for call answer with tracks:", 
                    localStream.getTracks().map(t => 
                        `${t.kind}: enabled=${t.enabled}, muted=${t.muted}, label=${t.label}`
                    ).join('\n')
                );
                
                // Create peer connection with our enhanced configuration
                peerConnection = new RTCPeerConnection(rtcConfig);
                
                // Add our local stream to the connection
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                    console.log(`Added local track to peer connection in acceptCall: ${track.kind}`);
                });
                
                // Set up event handlers for this peer connection
                setupPeerConnectionHandlers();
                
                // Set the remote description (the offer)
                await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
                console.log("Set remote description successfully");
                
                // Create an answer
                const answerOptions = {
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: false,
                    iceRestart: true
                };
                
                const answer = await peerConnection.createAnswer(answerOptions);
                console.log("Answer created successfully");
                
                // Set local description (our answer)
                await peerConnection.setLocalDescription(answer);
                console.log("Set local description successfully");
                
                // Send the answer to the caller
                socket.emit('call-answer', {
                    answer: peerConnection.localDescription,
                    caller: incomingCaller,
                    target: incomingCaller,
                    sender: username
                });
                
                // Update UI
                activeCall = true;
                endCallBtn.style.display = 'inline-block';
                
                updateDebugInfo({
                    action: 'call-accepted',
                    caller: incomingCaller
                });
                
            } catch (error) {
                console.error('Error accepting call:', error);
                callStatus.textContent = `Call failed: ${error.message}`;
                updateDebugInfo({
                    action: 'accept-call-error',
                    error: error.message
                });
            }
        }
        
        // Function to end a call
        function endCall() {
            console.log("Ending call");
            
            // Get incoming call dialog and sound elements
            const incomingCallDialog = document.getElementById('incomingCallDialog');
            const incomingCallSound = document.getElementById('incomingCallSound');
            
            // Hide incoming call dialog if it's visible
            if (incomingCallDialog) {
                incomingCallDialog.style.display = 'none';
            }
            
            // Stop any incoming call sound
            if (incomingCallSound) {
                incomingCallSound.pause();
                incomingCallSound.currentTime = 0;
            }
            
            // Notify the other user about call ending
            if (callToUsername || incomingCaller) {
                socket.emit('end-call', {
                    target: callToUsername || incomingCaller,
                    sender: username
                });
            }
            
            // Clean up and reset call state
            resetCallState();
            
            // Update UI
            callStatus.textContent = 'Call ended';
            setTimeout(() => {
                callStatus.style.display = 'none';
                callStatus.textContent = '';
            }, 3000);
            
            updateDebugInfo({
                action: 'call-ended',
                byUser: true
            });
        }
        
        // Properly define resetCallState function
        function resetCallState() {
            console.log("Resetting call state...");
            
            // Stop all audio monitoring intervals
            if (audioMonitoringIntervals.length > 0) {
                audioMonitoringIntervals.forEach(interval => clearInterval(interval));
                audioMonitoringIntervals = [];
            }
            
            // Clear connection monitor interval
            if (connectionMonitorInterval) {
                clearInterval(connectionMonitorInterval);
                connectionMonitorInterval = null;
            }
            
            // Clean up remote audio
            const remoteAudio = document.getElementById('remoteAudio');
            if (remoteAudio && remoteAudio.srcObject) {
                const tracks = remoteAudio.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                remoteAudio.srcObject = null;
            }
            
            // Clean up local stream
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    track.stop();
                });
                localStream = null;
            }
            
            // Clean up peer connection
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            // Reset call state variables
            activeCall = false;
            callToUsername = null;
            incomingCaller = null;
            
            // Reset UI
            startCallBtn.style.display = 'inline-block';
            endCallBtn.style.display = 'none';
            
            console.log("Call state reset complete");
        }
        
        // Add debug helper function to periodically check connection status
        connectionMonitorInterval = setInterval(() => {
            // Only run checks during active calls
            if (activeCall && peerConnection && (peerConnection.iceConnectionState === 'checking' || 
                peerConnection.iceConnectionState === 'connecting')) {
                
                console.log("Connection still establishing, attempting to help...");
                
                // If we're stuck in checking state for too long, try refreshing the connection
                try {
                    // Restart ICE if possible
                    if (peerConnection.restartIce) {
                        peerConnection.restartIce();
                        console.log("ICE restart triggered");
                    }
                } catch (error) {
                    console.error("Error during ICE restart:", error);
                }
            }
        }, 5000);  // Check every 5 seconds
        
        // Fix for initial page load - force scroll to bottom after everything else
        window.onload = function() {
            setTimeout(function() {
                scrollToBottom();
            }, 1000);
        };
        
        // Very aggressive approach to ensure scrolling works - only when at bottom
        setInterval(function() {
            if (messagesContainer && messagesContainer.scrollHeight > 0 && !userIsScrolling) {
                forceScrollToBottom();
            }
        }, 2000);
        
        // Add scrollbar hover effect for Firefox and other browsers with limited scrollbar hover support
        document.addEventListener('DOMContentLoaded', function() {
            const scrollElements = document.querySelectorAll('#messages');
            
            scrollElements.forEach(el => {
                el.addEventListener('mouseover', function(e) {
                    // Check if we're hovering over the scrollbar area (right edge)
                    const rect = el.getBoundingClientRect();
                    const isNearRightEdge = (e.clientX > rect.right - 15);
                    
                    if (isNearRightEdge) {
                        document.documentElement.style.setProperty('--scrollbar-color', 'rgb(240, 65, 129)');
                    }
                });
                
                el.addEventListener('mouseout', function() {
                    document.documentElement.style.setProperty('--scrollbar-color', 'rgb(67, 20, 128)');
                });
            });
        });
        
        // Add password change functionality
        const changePasswordForm = document.getElementById('changePasswordForm');
        
        changePasswordForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Verify passwords match
            if (newPassword !== confirmPassword) {
                alert("New passwords do not match!");
                return;
            }
            
            // Verify with server
            socket.emit('change-password', {
                username,
                currentPassword,
                newPassword
            }, (response) => {
                if (response.success) {
                    // Update stored password
                    localStorage.setItem('chatPassword', newPassword);
                    alert("Password changed successfully!");
                    
                    // Clear form
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    
                    // Close settings panel
                    settingsPanel.style.display = 'none';
                    settingsBackdrop.style.display = 'none';
                } else {
                    alert(response.message || "Failed to change password. Please try again.");
                }
            });
        });
        
        // Add a function to play a test tone
        function playTestTone(duration = 50) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 note
                
                // Set volume (significantly reduced)
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // Reduced from 0.2 to 0.05
                
                // Connect nodes
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                // Schedule tone play and stop
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + (duration / 1000));
                
                // Clean up
                oscillator.onended = () => {
                    oscillator.disconnect();
                    gainNode.disconnect();
                };
            } catch (error) {
                console.error("Error playing test tone:", error);
            }
        }
        
        // Monitor audio levels for debugging
        function monitorAudioLevels(audioElement, track) {
            try {
                console.log("Setting up audio level monitoring for", track.kind);
                
                // Create audio context for analysis
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(audioElement.srcObject);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser); // Critical line - connect source to analyzer
                
                // Create data array for analysis
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                // Check audio levels every 500ms
                const levelCheckInterval = setInterval(() => {
                    if (!audioElement || !audioElement.srcObject || !track.enabled || !activeCall) {
                        clearInterval(levelCheckInterval);
                        return;
                    }
                    
                    analyser.getByteFrequencyData(dataArray);
                    
                    // Calculate average volume
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i];
                    }
                    const average = sum / dataArray.length;
                    
                    // Update debug info with audio levels
                    updateDebugInfo({
                        remoteAudioLevel: average.toFixed(2),
                        audioElementState: audioElement.paused ? "paused" : "playing",
                        audioMuted: audioElement.muted,
                        trackEnabled: track.enabled,
                        trackMuted: track.muted,
                        trackState: track.readyState,
                        iceState: peerConnection ? peerConnection.iceConnectionState : "none",
                        connState: peerConnection ? peerConnection.connectionState : "none",
                        timestamp: new Date().toISOString()
                    });
                    
                    // If audio level is zero but we should be getting audio, try to restart
                    if (average < 0.01 && audioElement.srcObject && !audioElement.paused && track.enabled) {
                        console.log("Zero audio level detected - trying to recover");
                        
                        // Force play if possible
                        audioElement.play().catch(e => console.log("Play during recovery failed:", e));
                        
                        // Try a test tone to "wake up" the audio system
                        playTestTone(50);
                    }
                }, 500);
                
                // Store interval for cleanup
                audioMonitoringIntervals.push(levelCheckInterval);
            } catch (e) {
                console.error("Error monitoring audio levels:", e);
            }
        }
    </script>
